<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edge-TTS Studio</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>🎙️ Edge-TTS Studio</h1>
            <p>Générez des voix françaises premium en un clic</p>
        </header>

        <main>
            <div class="card">
                <div class="form-group">
                    <label for="voiceSelect">Sélectionner une voix</label>
                    <select id="voiceSelect" class="input-control">
                        <option value="">Chargement des voix...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="textInput">Texte à prononcer</label>
                    <textarea id="textInput" class="input-control" rows="5" placeholder="Entrez le texte ici..."></textarea>
                </div>

                <button id="generateBtn" class="primary-btn">
                    <span class="btn-text">Générer l'audio</span>
                    <div class="loader hidden"></div>
                </button>

                <div id="resultContainer" class="result-container hidden">
                    <h3>Résultat :</h3>
                    <audio id="audioPlayer" controls></audio>
                    <div style="display: flex; gap: 10px; margin-top: 15px;">
                        <a id="downloadBtn" class="secondary-btn" download="synthese_vocale.mp3">⬇️ Audio MP3</a>
                        <a id="downloadSrtBtn" class="secondary-btn" download="captions.srt">⬇️ Sous-titres SRT</a>
                    </div>
                </div>

                <div id="errorContainer" class="error-container hidden"></div>
            </div>
        </main>
    </div>

    <script>
        window.API_KEY = "{{API_KEY}}";
    </script>
    <script src="/static/script.js"></script>
</body>
</html>
